services:
  backend:
    build: ./backend
    container_name: atv-clients-backend
    environment:
      PYTHONUNBUFFERED: "1"
    env_file:
      - ./backend/.env
    ports:
      - "8007:8000"
    volumes:
      - /opt/atv-clients/transcripts:/opt/atv-clients/transcripts
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: atv-clients-frontend
    ports:
      - "8087:80"
    depends_on:
      - backend
    restart: unless-stopped